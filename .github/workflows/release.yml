name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust-target: ''
          - platform: windows-latest
            args: ''
            rust-target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Muhaseb Tech v__VERSION__'
          releaseBody: |
            Download the installer for your platform from the assets below.

            - **Windows:** `.msi` (silent-install friendly) or `.exe` (NSIS, double-click installer)
            - **macOS:** `.dmg` (drag into Applications)
            - **Linux:** `.deb` (Debian/Ubuntu) or `.rpm` (Fedora/RHEL)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Build and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          WORK="$(mktemp -d)"
          cd "$WORK"

          REPO_BASE="https://github.com/${REPO}/releases/download/${TAG}"

          MAC_ARM_BUNDLE="Muhaseb.Tech_aarch64.app.tar.gz"
          MAC_X64_BUNDLE="Muhaseb.Tech_x64.app.tar.gz"
          WIN_BUNDLE="Muhaseb.Tech_${VERSION}_x64-setup.exe"

          gh release download "$TAG" --repo "$REPO" \
            --pattern "${MAC_ARM_BUNDLE}.sig" \
            --pattern "${MAC_X64_BUNDLE}.sig" \
            --pattern "${WIN_BUNDLE}.sig"

          MAC_ARM_SIG=$(cat "${MAC_ARM_BUNDLE}.sig")
          MAC_X64_SIG=$(cat "${MAC_X64_BUNDLE}.sig")
          WIN_SIG=$(cat "${WIN_BUNDLE}.sig")

          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          NOTES="Muhaseb Tech ${TAG}"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg mac_arm_url "${REPO_BASE}/${MAC_ARM_BUNDLE}" \
            --arg mac_arm_sig "$MAC_ARM_SIG" \
            --arg mac_x64_url "${REPO_BASE}/${MAC_X64_BUNDLE}" \
            --arg mac_x64_sig "$MAC_X64_SIG" \
            --arg win_url "${REPO_BASE}/${WIN_BUNDLE}" \
            --arg win_sig "$WIN_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $mac_arm_sig, url: $mac_arm_url },
                "darwin-x86_64":  { signature: $mac_x64_sig, url: $mac_x64_url },
                "windows-x86_64": { signature: $win_sig,     url: $win_url     }
              }
            }' > latest.json

          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
