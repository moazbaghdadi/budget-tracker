name: Feature request
description: Propose an idea or enhancement
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening: check the [Roadmap](../../blob/main/README.md#roadmap) and existing issues to see if this is already discussed.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need does this address? Who is affected?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you solve it?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope-check
    attributes:
      label: Scope check
      options:
        - label: This fits the target user (elderly, low-tech, small organizations)
        - label: This works in all three UI languages (English, Arabic, German)
        - label: This does not require an online account or sync for the local-only mode
